<app-header-admin></app-header-admin>

<div class="general">
    <div class="encabezado">
    <h1>Lista de clientes</h1>
    <button class="boton1" [routerLink]="['/registrarCliente']">Agregar Cliente</button>
</div>

<div class="contenedor-clientes">

    @for (cli of clientes; track $index) {

    <div class="cliente">
        <div class="tarjeta">

        <h3>Nombre: {{cli.usuario.nombre}} {{cli.usuario.apellido}}</h3>

        <div class="direccion">
            <h5>Direccion:</h5>
            <p>{{cli.direccion}}</p>
        </div>

        <button class="boton2" (click)="verCliente(cli.id_cliente)">Ver Cliente</button>

        </div>
    </div>

    }

</div>
</div>
