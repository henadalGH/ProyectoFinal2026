<app-header-admin></app-header-admin>

<div class="titulo">
    <h1>Lista de empleados</h1>
    <button class="botonAgregar" [routerLink]="['/registrarEmpleado']">Agregar Empleado</button>
</div>

@for (empl of empleados; track $index) {

<div class="empleado">
    <h3>Nombre: {{empl.usuario.nombre}} {{empl.usuario.apellido}}</h3>
    <p>Email: {{empl.usuario.email}}</p>
    <p>Contacto: {{empl.usuario.contacto}}</p>
    <p>Cargo: {{empl.cargo.cargo}}</p>
    <button (click)="verEmpleado(empl.id)">Ver empleado</button>
</div>    

}
