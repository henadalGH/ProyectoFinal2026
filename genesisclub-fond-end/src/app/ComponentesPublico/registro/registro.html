    <div class="container">
    <div class="titulo">
        <h1>Registrarse</h1>
        <p>Complete el formulario</p>
    </div>

    <div class="formulario">
        <form class="form" (ngSubmit)="registrarCliente()">
            <div class="campo">
                <label>Nombre:</label>
                <input type="text" name="nombre" placeholder="Ingrese su nombre" [(ngModel)]="nombre" required>
            </div>

            <div class="campo">
                <label>Apellido:</label>
                <input type="text" name="apellido" placeholder="Ingrese su apellido" [(ngModel)]="apellido" required>
            </div>

            <div class="campo">
                <label>Email:</label>
                <input type="email" name="email" placeholder="ejemplo@email.com" [(ngModel)]="email" required>
            </div>

            <div class="campo">
                <label>Contraseña:</label>
                <input type="password" name="password" placeholder="Ingrese su contraseña" [(ngModel)]="password" required>
            </div>

            <div class="campo">
        <label>Contacto:</label>
        <div class="contenedorNum">
            <div class="numero">
            <label>Codigo de area</label>
            <input type="text" name="codigoArea" [(ngModel)]="codigoArea">
        </div>
        <div class="numero">
            <label>Numero</label>
            <input type="text" [(ngModel)]="numeroCel" name="numeroCel">
        </div>
        </div>
        
    </div>

            <div class="campo">
                <label>Dirección:</label>
                <input type="text" name="direccion" placeholder="Tu direccion" [(ngModel)]="direccion" required>
            </div>

            <button type="submit">Registrarme</button>
        </form>
    </div>
    </div>
