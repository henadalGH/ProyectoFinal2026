<div class="contenedor">
    <div class="titulo">
        <h1>Registrarse</h1>
        <p>Complete el formulario</p>
    </div>

    <form class="formulario">

        <div class="campo">
            <label>Nombre: </label>
            <input type="text">
        </div>

        <div class="campo">
            <label>Apellido: </label>
            <input type="text">
        </div>

        <div class="campo">
            <label>Email:</label>
            <input type="email">
        </div>

        <div class="campo">
            <label>Contraseña:</label>
            <input type="password">
        </div>

        <div class="numero">
            <div class="campo">
            <label>Codigo area: </label>
            <input type="text">
        </div>

        <div class="campo">
            <label>Numero:</label>
            <input type="text">
        </div>

        </div>

        <div class="campo">
            <label>Dirección: </label>
            <input type="text">
        </div>

        <button class="btn-regis">Registrarse</button>
    </form>
        <button class="btn-can" [routerLink]="['/inicio']">Cancelar</button>
</div>
